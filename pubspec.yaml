name: money_buddy
description: "Money Buddy – Personal Finance Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Speech to text
  speech_to_text: ^7.4.0

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.68.0

  # Fonts & UI
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Shared Preferences
  shared_preferences: ^2.3.2

  # Icons & Assets
  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
